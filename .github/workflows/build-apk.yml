name: Build Web to APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build APK from HTML
        uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: "build"   # Ganti dengan folder tempat file HTML-mu berada
          app-name: "NamAplikasiKu"    # Nama yang muncul di HP
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-apk
          path: my-apks/   # Folder hasil output
