name: Build Web to APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # <-- SUDAH DIUBAH KE 22
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build APK from HTML
        uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: "build"   # Ganti dengan folder file HTML-mu
          app-name: "NamAplikasiKu"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-apk
          path: my-apks/
