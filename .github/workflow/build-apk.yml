name: Build HTML to APK
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Install Ionic & Capacitor
      run: |
        npm install -g @ionic/cli @capacitor/cli
        
    - name: Create Ionic Project
      run: |
        ionic start myApp blank --type=react --no-git --no-confirm
        cd myApp
        npm install
        
    - name: Copy HTML Files
      run: |
        rm -rf myApp/public/*
        cp -r build/* myApp/public/ 2>/dev/null || true
        cp -r build/* myApp/src/assets/ 2>/dev/null || true
        
    - name: Build Web Assets
      run: |
        cd myApp
        npm run build
        
    - name: Sync Capacitor
      run: |
        cd myApp
        npx cap init MyApp com.example.myapp
        npx cap add android
        npx cap copy android
        
    - name: Build APK
      run: |
        cd myApp/android
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: myApp/android/app/build/outputs/apk/debug/
